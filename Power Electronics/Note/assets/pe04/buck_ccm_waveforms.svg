<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560">
  <style>
    .axis{stroke:#222;stroke-width:2;marker-end:url(#arrow)}
    .grid{stroke:#aaa;stroke-width:1.3;stroke-dasharray:6 6}
    .wave{stroke:#0b66c3;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .wave2{stroke:#c3382b;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .txt{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#111}
    .small{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#333}
    .title{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:bold;fill:#111}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#222"/>
    </marker>
  </defs>
  <text x="320" y="32" class="title">Buck CCM key waveforms</text>

  <line x1="85" y1="115" x2="820" y2="115" class="axis"/>
  <line x1="100" y1="165" x2="100" y2="65" class="axis"/>
  <text x="825" y="121" class="txt">t</text>
  <text x="54" y="85" class="txt">qS</text>
  <path d="M100 80 H300 V145 H500 V80 H700 V145 H820" class="wave"/>
  <line x1="300" y1="55" x2="300" y2="520" class="grid"/>
  <line x1="500" y1="55" x2="500" y2="520" class="grid"/>
  <line x1="700" y1="55" x2="700" y2="520" class="grid"/>
  <text x="174" y="157" class="small">DTs</text>
  <text x="363" y="157" class="small">(1-D)Ts</text>

  <line x1="85" y1="250" x2="820" y2="250" class="axis"/>
  <line x1="100" y1="305" x2="100" y2="190" class="axis"/>
  <text x="825" y="256" class="txt">t</text>
  <text x="48" y="213" class="txt">vL</text>
  <path d="M100 205 H300 V285 H500 V205 H700 V285 H820" class="wave2"/>
  <text x="138" y="199" class="small">Vd - Vo</text>
  <text x="350" y="304" class="small">-Vo</text>

  <line x1="85" y1="405" x2="820" y2="405" class="axis"/>
  <line x1="100" y1="505" x2="100" y2="335" class="axis"/>
  <text x="825" y="411" class="txt">t</text>
  <text x="48" y="355" class="txt">iL</text>
  <path d="M100 465 L300 360 L500 465 L700 360 L820 423" class="wave"/>
  <line x1="100" y1="412" x2="820" y2="412" class="grid"/>
  <text x="116" y="350" class="small">Imax</text>
  <text x="116" y="488" class="small">Imin &gt; 0</text>
  <text x="114" y="432" class="small">IL = Io</text>
  <text x="535" y="470" class="small">CCM: inductor current never reaches zero</text>
</svg>
