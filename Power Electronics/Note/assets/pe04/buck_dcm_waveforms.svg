<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420">
  <style>
    .axis{stroke:#222;stroke-width:2;marker-end:url(#arrow)}
    .grid{stroke:#aaa;stroke-width:1.3;stroke-dasharray:6 6}
    .wave{stroke:#0b66c3;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .txt{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#111}
    .small{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#333}
    .title{font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:bold;fill:#111}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#222"/>
    </marker>
  </defs>
  <text x="300" y="34" class="title">Buck DCM inductor current</text>

  <line x1="90" y1="315" x2="830" y2="315" class="axis"/>
  <line x1="110" y1="350" x2="110" y2="70" class="axis"/>
  <text x="835" y="321" class="txt">t</text>
  <text x="58" y="85" class="txt">iL</text>
  <line x1="270" y1="75" x2="270" y2="350" class="grid"/>
  <line x1="500" y1="75" x2="500" y2="350" class="grid"/>
  <line x1="760" y1="75" x2="760" y2="350" class="grid"/>
  <path d="M110 315 L270 115 L500 315 H760 L830 230" class="wave"/>
  <text x="160" y="338" class="small">D Ts</text>
  <text x="350" y="338" class="small">D2 Ts</text>
  <text x="602" y="338" class="small">D3 Ts</text>
  <text x="274" y="110" class="small">Ipk</text>
  <text x="118" y="302" class="small">0</text>

  <text x="128" y="52" class="small">Stage 1: S on, vL = Vd - Vo, iL rises.</text>
  <text x="128" y="78" class="small">Stage 2: S off, diode on, vL = -Vo, iL falls to zero.</text>
  <text x="128" y="104" class="small">Stage 3: both S and diode off, iL = 0.</text>
  <text x="538" y="154" class="small">DCM gain depends on D, L, R, fs.</text>
</svg>
