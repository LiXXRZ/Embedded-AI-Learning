<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430">
  <style>
    .axis{stroke:#222;stroke-width:2;marker-end:url(#arrow)}
    .zero{stroke:#222;stroke-width:1.5}
    .src{stroke:#999;stroke-width:2.5;fill:none;stroke-dasharray:6 6}
    .out{stroke:#0b66c3;stroke-width:4;fill:none;stroke-linecap:round}
    .dio{stroke:#c3382b;stroke-width:4;fill:none;stroke-linecap:round}
    .txt{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#111}
    .small{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#333}
    .title{font-family:Arial,Helvetica,sans-serif;font-size:21px;font-weight:bold;fill:#111}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#222"/>
    </marker>
  </defs>

  <text x="310" y="28" class="title">S2-2 ideal half-wave rectifier waveforms</text>

  <line x1="70" y1="160" x2="850" y2="160" class="axis"/>
  <line x1="90" y1="260" x2="90" y2="55" class="axis"/>
  <text x="858" y="166" class="txt">wt</text>
  <text x="100" y="66" class="txt">v_d(t)</text>
  <text x="92" y="180" class="small">0</text>
  <text x="242" y="183" class="small">pi</text>
  <text x="406" y="183" class="small">2pi</text>
  <text x="570" y="183" class="small">3pi</text>
  <text x="734" y="183" class="small">4pi</text>
  <line x1="250" y1="55" x2="250" y2="260" class="zero" opacity="0.2"/>
  <line x1="410" y1="55" x2="410" y2="260" class="zero" opacity="0.2"/>
  <line x1="570" y1="55" x2="570" y2="260" class="zero" opacity="0.2"/>
  <line x1="730" y1="55" x2="730" y2="260" class="zero" opacity="0.2"/>
  <path d="M90 160 C130 60 210 60 250 160 C290 260 370 260 410 160 C450 60 530 60 570 160 C610 260 690 260 730 160 C770 60 830 70 850 120" class="src"/>
  <path d="M90 160 C130 60 210 60 250 160 L410 160 C450 60 530 60 570 160 L730 160 C770 60 830 70 850 120" class="out"/>
  <text x="675" y="78" class="small" fill="#0b66c3">v_d(t)=v(t), when sin(wt)&gt;0</text>
  <text x="276" y="210" class="small">v_d(t)=0, when sin(wt)&lt;0</text>
  <text x="675" y="112" class="small" fill="#777">dashed: source v(t)</text>

  <line x1="70" y1="345" x2="850" y2="345" class="axis"/>
  <line x1="90" y1="405" x2="90" y2="235" class="axis"/>
  <text x="858" y="351" class="txt">wt</text>
  <text x="100" y="248" class="txt">v_D(t)</text>
  <text x="92" y="365" class="small">0</text>
  <line x1="250" y1="235" x2="250" y2="405" class="zero" opacity="0.2"/>
  <line x1="410" y1="235" x2="410" y2="405" class="zero" opacity="0.2"/>
  <line x1="570" y1="235" x2="570" y2="405" class="zero" opacity="0.2"/>
  <line x1="730" y1="235" x2="730" y2="405" class="zero" opacity="0.2"/>
  <path d="M90 345 L250 345 C290 430 370 430 410 345 L570 345 C610 430 690 430 730 345 L850 345" class="dio"/>
  <text x="190" y="328" class="small" fill="#c3382b">v_D(t)=0 when diode conducts</text>
  <text x="450" y="405" class="small" fill="#c3382b">v_D(t)=v(t)&lt;0 when diode blocks</text>
</svg>
